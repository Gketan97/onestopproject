[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# ── COOP/COEP headers — required for DuckDB-Wasm SharedArrayBuffer ────────────
# Scoped to case-study and portfolio only — keeps Razorpay payment popup safe
[[headers]]
  for = "/case-study/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

[[headers]]
  for = "/portfolio/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

# ── Case study routes ──────────────────────────────────────────────────────────
# Direct HTML file — served as static (legacy URL, now also used by the iframe)
[[redirects]]
  from   = "/case-studies/swiggy.html"
  to     = "/case-studies/swiggy.html"
  status = 200

# Clean URL → React case study wrapper at /case-study/swiggy
[[redirects]]
  from   = "/case-study/*"
  to     = "/index.html"
  status = 200

# Legacy /case-studies/swiggy (no .html) → keep working
[[redirects]]
  from   = "/case-studies/swiggy"
  to     = "/case-studies/swiggy.html"
  status = 200

# ── Portfolio ──────────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/portfolio/*"
  to     = "/index.html"
  status = 200

# ── SPA fallback — must be last ────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5173
  publish    = "dist"
